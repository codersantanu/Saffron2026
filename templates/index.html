<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saffron Terrarium Dashboard</title>
    <style>
        :root { --primary: #FF9933; --bg: #1e1e2f; --card: #2a2a40; --text: #ffffff; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        h1 { text-align: center; color: var(--primary); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1000px; margin: 0 auto; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); text-align: center; }
        .value { font-size: 2.5em; font-weight: bold; margin: 10px 0; color: var(--primary); }
        .controls { max-width: 600px; margin: 30px auto; background: var(--card); padding: 20px; border-radius: 12px; }
        .control-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #444; }
        
        /* Toggle Switch CSS */
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(26px); }
        input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }

        input[type=range] { width: 100%; accent-color: var(--primary); }
        button { background-color: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1.1em; font-weight: bold; }
        button:hover { background-color: #e68a00; }
    </style>
</head>
<body>

    <h1>🌸 Saffron Terrarium Live</h1>

    <div class="grid">
        <div class="card"><h3>Temperature</h3><div class="value" id="temp">-- °C</div></div>
        <div class="card"><h3>Humidity</h3><div class="value" id="hum">-- %</div></div>
        <div class="card"><h3>Soil Moisture</h3><div class="value" id="soil">-- %</div></div>
        <div class="card"><h3>Air Quality (CO2)</h3><div class="value" id="air">-- raw</div></div>
    </div>

    <div class="controls">
        <h2 style="text-align: center; color: var(--primary);">Remote Control</h2>
        
        <div class="control-group">
            <strong>System Mode</strong>
            <select id="mode" onchange="toggleManualControls()">
                <option value="AUTO">🤖 AUTO MODE</option>
                <option value="MANUAL">🖐️ MANUAL MODE</option>
            </select>
        </div>

        <div class="control-group">
            <span>❄️ Peltier Kit (Cooling)</span>
            <label class="switch"><input type="checkbox" id="peltier" class="manual-input"><span class="slider"></span></label>
        </div>
        <div class="control-group">
            <span>🌫️ Mist Maker (Humidity)</span>
            <label class="switch"><input type="checkbox" id="mist" class="manual-input"><span class="slider"></span></label>
        </div>
        <div class="control-group">
            <span>💨 Exhaust Fan (Air Clear)</span>
            <label class="switch"><input type="checkbox" id="exhaust" class="manual-input"><span class="slider"></span></label>
        </div>
        <div class="control-group">
            <span>🚨 Alarm Buzzer</span>
            <label class="switch"><input type="checkbox" id="buzzer" class="manual-input"><span class="slider"></span></label>
        </div>
        
        <div style="margin-top: 20px;">
            <label>☀️ LED Brightness (PWM: <span id="pwmVal">0</span>)</label><br>
            <input type="range" id="pwm" min="0" max="255" value="0" class="manual-input" oninput="document.getElementById('pwmVal').innerText = this.value">
        </div>

        <button onclick="sendCommand()" style="margin-top: 20px;">🚀 UPDATE HARDWARE</button>
    </div>

    <script>
        const API_URL = ""; // Empty means it uses the same domain it's hosted on

        // Fetch Live Sensor Data every 5 seconds
        async function fetchSensors() {
            try {
                let res = await fetch(API_URL + '/api/sensor');
                let data = await res.json();
                if(data.temperature !== undefined) {
                    document.getElementById('temp').innerText = data.temperature.toFixed(1) + " °C";
                    document.getElementById('hum').innerText = data.humidity.toFixed(1) + " %";
                    document.getElementById('soil').innerText = data.soil_moisture.toFixed(0) + " %";
                    document.getElementById('air').innerText = data.air_quality.toFixed(0) + " raw";
                }
            } catch (err) { console.error("Error fetching sensors", err); }
        }

        // Fetch the current switch states on load
        async function fetchControls() {
            try {
                let res = await fetch(API_URL + '/api/control');
                let data = await res.json();
                if(data.mode) {
                    document.getElementById('mode').value = data.mode;
                    document.getElementById('peltier').checked = data.Relay2_peltier;
                    document.getElementById('mist').checked = data.Relay1_mist_maker;
                    document.getElementById('exhaust').checked = data.Relay3_exhaust_fan;
                    document.getElementById('buzzer').checked = data.buzzer_state;
                    document.getElementById('pwm').value = data.pwm_value;
                    document.getElementById('pwmVal').innerText = data.pwm_value;
                    toggleManualControls();
                }
            } catch (err) { console.error("Error fetching controls", err); }
        }

        // Send new command to Flask API
        async function sendCommand() {
            let payload = {
                device_id: 'ESP32_SAFFRON_1',
                mode: document.getElementById('mode').value,
                Relay2_peltier: document.getElementById('peltier').checked,
                Relay1_mist_maker: document.getElementById('mist').checked,
                Relay3_exhaust_fan: document.getElementById('exhaust').checked,
                buzzer_state: document.getElementById('buzzer').checked,
                pwm_value: parseInt(document.getElementById('pwm').value)
            };

            await fetch(API_URL + '/api/control', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            alert("Command sent to TiDB Cloud! 🚀");
        }

        // Disable manual switches if in AUTO mode
        function toggleManualControls() {
            let isAuto = document.getElementById('mode').value === 'AUTO';
            let inputs = document.getElementsByClassName('manual-input');
            for(let i=0; i<inputs.length; i++) {
                inputs[i].disabled = isAuto;
            }
        }

        // Initialization
        fetchControls();
        fetchSensors();
        setInterval(fetchSensors, 5000); 
    </script>
</body>
</html>
